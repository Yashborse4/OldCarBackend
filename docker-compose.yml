# ============================================================================
# Production Docker Compose Configuration - Secure Deployment
# Sell The Old Car - Only Nginx exposes public ports
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Nginx Reverse Proxy - Only service with public exposure
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: car-selling-nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certbot/conf:/etc/letsencrypt:ro
      - ./docker/nginx/certbot/www:/var/www/certbot:ro
      - uploads-data:/var/www/uploads:ro
    networks:
      - backend
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # --------------------------------------------------------------------------
  # Certbot - SSL Certificate Manager
  # --------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: car-selling-certbot
    volumes:
      - ./docker/nginx/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/certbot/www:/var/www/certbot
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # --------------------------------------------------------------------------
  # Application Service - Internal only
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: car-selling-app:latest
    container_name: car-selling-app
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "8080"
    environment:
      # Database Configuration
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/carselling
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-car_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-car_password}

      # Redis Configuration
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # Server Configuration
      - SERVER_PORT=8080
      - LOGGING_LEVEL_ROOT=${LOG_LEVEL:-INFO}

      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-900000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}

      # File Storage
      - STORAGE_UPLOAD_PATH=/app/uploads

      # B2 Configuration
      - B2_APPLICATION_KEY_ID=${B2_APPLICATION_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
      - B2_BUCKET_ID=${B2_BUCKET_ID}
      - B2_CDN_DOMAIN=${B2_CDN_DOMAIN}

      # OpenSearch Configuration
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}

      # Email Configuration
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      - uploads-data:/app/uploads
      - logs-data:/app/logs
      - ./config:/app/config:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --------------------------------------------------------------------------
  # PostgreSQL Database - Internal only (NOT exposed publicly)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: car-selling-postgres
    restart: unless-stopped
    command: >
      postgres -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=768MB -c maintenance_work_mem=64MB
    mem_limit: 1g
    cpus: 1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
      - POSTGRES_DB=carselling
      - POSTGRES_USER=${DB_USERNAME:-car_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-car_password}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${DB_USERNAME:-car_user} -d carselling || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # PostgreSQL Backup - Automated Daily Dumps
  # --------------------------------------------------------------------------
  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: car-selling-db-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=carselling
      - POSTGRES_USER=$${DB_USERNAME:-car_user}
      - POSTGRES_PASSWORD=$${DB_PASSWORD:-car_password}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    volumes:
      - ./docker/backups:/backups
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Redis Cache - Internal only
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: car-selling-redis
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # OpenSearch - Internal only
  # --------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: car-selling-opensearch
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - cluster.name=car-selling-cluster
      - node.name=car-selling-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    expose:
      - "9200"
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# --------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  opensearch-data:
    driver: local
  uploads-data:
    driver: local
  logs-data:
    driver: local

# --------------------------------------------------------------------------
# Networks
# --------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
    internal: true
