name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: true
        type: choice
        options:
          - standard
          - clean
        default: 'standard'

jobs:
  deploy:
    name: Deploy Application to VPS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Execute Deployment Script via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT || '22' }}
        timeout: 300s
        command_timeout: 600s
        script: |
          set -e

          cd OldCarBackend

          echo "==== Pulling latest changes ===="
          git pull origin main

          chmod +x deploy.sh

          DEPLOY_TYPE="${{ github.event.inputs.deploy_type || 'standard' }}"

          if [ "$DEPLOY_TYPE" = "clean" ]; then
            echo "==== CLEAN DEPLOY (full rebuild) ===="
            ./deploy.sh clean-deploy
          else
            echo "==== STANDARD DEPLOY (build + restart) ===="
            ./deploy.sh build
            ./deploy.sh restart
          fi

          echo "==== Verifying deployment ===="
          sleep 15
          docker compose ps
          echo "==== Deployment Completed Successfully ===="
