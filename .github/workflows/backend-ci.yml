name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    
    services:
      opensearch:
        image: opensearchproject/opensearch:latest
        env:
          discovery.type: single-node
          plugins.security.disabled: "true"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cat/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      env:
        OPENSEARCH_HOST: localhost
        OPENSEARCH_SCHEME: http
        SPRING_DATA_REDIS_HOST: localhost
        
        # Security Secrets
        APP_JWT_SECRET: ${{ secrets.JWT_SECRET }}
        
        # External Services (B2, Mail)
        B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
        B2_BUCKET_ID: ${{ secrets.B2_BUCKET_ID }}
        
        SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        SPRING_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }} 
      run: ./gradlew build --parallel --info

    - name: Publish Test Results
      uses: actions/upload-artifact@v4
      if: always()
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        name: test-results
        path: |
          build/test-results/
          build/reports/
        if-no-files-found: ignore
