# Nginx Configuration for Sell The Old Car
# PRODUCTION GRADE: SSL Hardened, Layered Rate Limiting, and Real IP Handling

# Map for WebSocket support
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Map for X-Forwarded-Proto
map $http_x_forwarded_proto $the_scheme {
    default $http_x_forwarded_proto;
    "" $scheme;
}

# Upstream Application
upstream app {
    server car-selling-app:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ==============================================================================
# RATE LIMITING (Layer 1: Network Level Protection)
# ==============================================================================
# Zone for general API traffic (30 requests/sec with burst)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

# Zone for Auth endpoints (Strict: 2 requests/sec)
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=2r/s;

# Zone for concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ==============================================================================
# HTTP REDIRECT (Port 80 -> HTTPS)
# ==============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.wheeldeals.co.in;

    # Health check for Docker/Load Balancer needs to stay on HTTP
    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    # Redirect everyone else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==============================================================================
# MAIN HTTPS SERVER (Port 443)
# ==============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.wheeldeals.co.in;

    # SSL Certificates (Mounted via Docker)
    ssl_certificate /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # SSL Security Parameters (Modern Standards)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Cloudflare Real IP Configuration
    # Trust Cloudflare IPs (Updated List)
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Global connection limit (max 20 concurrent connections per IP)
    limit_conn conn_limit 20;

    # Main API Location
    location / {
        # Network-level general rate limit
        limit_req zone=api_general burst=40 nodelay;

        proxy_pass http://app;
        proxy_http_version 1.1;

        # Headers for Spring Boot
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Force HTTPS for Spring context

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts (Adjusted for production)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Standard Buffers
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Strict Auth Rate Limiting (Layer 1 Protection)
    location ~* ^/api/auth/(login|register|otp/send) {
        limit_req zone=api_auth burst=10 nodelay;
        
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static uploads - serve directly from nginx
    location /uploads/ {
        alias /var/www/uploads/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Security - only serve images/pdfs
        location ~* \.(jpg|jpeg|png|gif|webp|pdf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Deny scripts in upload folder
        location ~* \.(php|py|pl|sh|bash|jsp)$ {
            deny all;
        }
    }

    # Deny access to management Actuator for external traffic
    location /management {
        deny all;
        return 403;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    client_max_body_size 50M;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
