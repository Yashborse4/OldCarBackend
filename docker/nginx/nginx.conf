# Nginx Configuration for Sell The Old Car
# Production reverse proxy with SSL, Let's Encrypt hooks, security headers and performance optimizations

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream app {
    server car-selling-app:8080 max_fails=3 fail_timeout=30s;
}

# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# HTTP Server (No SSL)
server {
    listen 80;
    server_name api.wheeldeals.co.in;
    
    # Health check endpoint for Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Proxy to Spring Boot application
    location / {
        # Apply strict rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://app;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Static uploads - serve directly from nginx
    location /uploads/ {
        alias /var/www/uploads/;
        autoindex off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Security - only serve specific file types
        location ~* \.(jpg|jpeg|png|gif|webp|pdf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Deny access to other file types
        location ~* \.(php|php3|php4|php5|phtml|pl|py|jsp|asp|aspx|cgi|sh|bash)$ {
            deny all;
            return 403;
        }
    }
    
    # Management/Actuator endpoints - block public access (internal healthcheck only)
    location /management {
        deny all;
        return 403;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    
    # Client body size limit (for file uploads)
    client_max_body_size 50M;
    
    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
