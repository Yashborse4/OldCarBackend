spring:
  application:
    name: Sell-the-old-Car
  profiles:
    default: dev # Default to development profile if none is specified

  data:
    redis:
      repositories:
        enabled: false

  messages:
    basename: classpath:messages/messages
    encoding: UTF-8

  jpa:
    open-in-view: false

  # Date format handling
  mvc:
    format:
      date: yyyy-MM-dd
      date-time: yyyy-MM-dd HH:mm:ss
      time: HH:mm:ss
  
  # Jackson JSON formatting
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  # Mail Configuration (Default/Dev)
  mail:
    host: smtp.gmail.com
    port: 587
    username: dev-email@example.com
    password: password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Actuator Endpoints (Common)
management:
  endpoints:
    web:
      base-path: /management
      exposure:
        include: health,info,metrics
# Application Specific Configuration
app:
  redis:
    clear-on-startup: ${REDIS_CLEAR_ON_STARTUP:true}
  email:
    from: ${EMAIL_FROM:}
